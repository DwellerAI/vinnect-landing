<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinnect — The CRM Built for Wine</title>
  <meta name="description" content="Vinnect connects what you do to what sells. The personal CRM built for wine sales reps — smart follow-ups, sales attribution, and club health tracking powered by Commerce7.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>

    /* ========== AMBER PALETTE CONSTANTS ========== */
    :root {
      --amber-50: #FFFBEB;
      --amber-100: #FEF3C7;
      --amber-200: #FDE68A;
      --amber-300: #FCD34D;
      --amber-400: #FBBF24;
      --amber-500: #D4A017;
      --amber-600: #B8860B;
    }

    /* ========== DARK THEME (DEFAULT) ========== */
    [data-theme="dark"] {
      --bg: #0c0a09;
      --bg-alt: #1a1410;
      --surface: #1c1917;
      --card: #292524;
      --border: rgba(251, 191, 36, 0.15);
      --border-hover: rgba(251, 191, 36, 0.3);
      --text-primary: #e7e5e4;
      --text-secondary: #a8a29e;
      --text-muted: #78716c;
      --nav-bg: rgba(12, 10, 9, 0.85);
      --nav-border: rgba(251, 191, 36, 0.1);
      --input-bg: rgba(0, 0, 0, 0.3);
      --badge-bg: rgba(251, 191, 36, 0.12);
      --badge-border: rgba(251, 191, 36, 0.25);
      --pill-border: #3d3225;
      --pill-text: #d6d3d1;
      --pill-active-bg: rgba(251, 191, 36, 0.1);
      --pill-active-border: var(--amber-400);
      --pill-active-text: var(--amber-400);
      --step-bg: rgba(251, 191, 36, 0.1);
      --card-glow: rgba(251, 191, 36, 0.08);
      --shadow-soft: rgba(0, 0, 0, 0.15);
      --shadow-med: rgba(0, 0, 0, 0.3);
    }

    /* ========== LIGHT THEME ========== */
    [data-theme="light"] {
      --bg: #fafaf9;
      --bg-alt: #f5f5f4;
      --surface: #ffffff;
      --card: #f5f5f4;
      --border: #d6d3d1;
      --border-hover: #a8a29e;
      --text-primary: #1c1917;
      --text-secondary: #57534e;
      --text-muted: #78716c;
      --nav-bg: rgba(250, 250, 249, 0.9);
      --nav-border: #e7e5e4;
      --input-bg: #f5f5f4;
      --badge-bg: rgba(251, 191, 36, 0.08);
      --badge-border: rgba(251, 191, 36, 0.2);
      --pill-border: #d6d3d1;
      --pill-text: #57534e;
      --pill-active-bg: rgba(251, 191, 36, 0.08);
      --pill-active-border: var(--amber-500);
      --pill-active-text: var(--amber-600);
      --step-bg: rgba(251, 191, 36, 0.08);
      --card-glow: rgba(251, 191, 36, 0.05);
      --shadow-soft: rgba(0, 0, 0, 0.05);
      --shadow-med: rgba(0, 0, 0, 0.1);
    }

    /* ========== GLOBAL RESET ========== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ========== TYPOGRAPHY ========== */
    h1, h2, h3, h4 {
      font-family: 'Cormorant', serif;
      line-height: 1.2;
      font-weight: 600;
    }

    h1 { font-size: clamp(36px, 5vw, 56px); }
    h2 { font-size: clamp(28px, 4vw, 42px); }
    h3 { font-size: clamp(20px, 2.5vw, 28px); }
    h4 { font-size: clamp(18px, 2vw, 22px); }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ========== LAYOUT UTILITIES ========== */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .section-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--amber-400);
      margin-bottom: 12px;
    }

    .section-heading {
      margin-bottom: 12px;
    }

    .section-subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      max-width: 600px;
    }

    .text-center { text-align: center; }
    .mx-auto { margin-left: auto; margin-right: auto; }

    /* ========== BUTTONS ========== */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 10px;
      background: var(--amber-400);
      color: #1c1917;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 10px;
      background: transparent;
      color: var(--text-primary);
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-secondary:hover {
      background: var(--surface);
      border-color: var(--text-muted);
    }

    /* ========== ACCESSIBILITY ========== */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    *:focus-visible {
      outline: 2px solid var(--amber-400);
      outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ========== RESPONSIVE BASE ========== */
    .hide-mobile { display: flex; }
    .show-mobile { display: none; }

    @media (max-width: 768px) {
      .hide-mobile { display: none !important; }
      .show-mobile { display: flex !important; }
    }

  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="nav-fixed" id="nav"></div>
    <main>
      <section class="section-hero" id="hero"></section>
      <section class="section-audience" id="audience"></section>
      <section class="section-advantage" id="advantage"></section>
      <section class="section-features" id="features"></section>
      <section class="section-dashboard" id="dashboard"></section>
      <section class="section-deep-features" id="deep-features"></section>
      <section class="section-steps" id="steps"></section>
      <section class="section-pricing" id="pricing"></section>
      <section class="section-trust" id="trust"></section>
      <section class="section-cta" id="signup"></section>
      <footer class="section-footer" id="footer"></footer>
    </main>
  </div>

  <script>
    // Theme toggle
    (function() {
      const html = document.documentElement;
      const saved = localStorage.getItem('vinnect-theme');
      if (saved) html.setAttribute('data-theme', saved);

      window.toggleTheme = function() {
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('vinnect-theme', next);
      };
    })();
  </script>
</body>
</html>
